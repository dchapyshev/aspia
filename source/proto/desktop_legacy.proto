syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "desktop_audio.proto";
import "desktop_clipboard.proto";
import "desktop_cursor.proto";
import "desktop_input.proto";
import "desktop_video.proto";

package proto.legacy;

message Extension
{
    string name = 1;
    bytes data  = 2;
}

message Capabilities
{
    enum OsType
    {
        OS_TYPE_WINDOWS = 0;
        OS_TYPE_LINUX   = 1;
        OS_TYPE_MACOSX  = 2;
    }

    message Flag
    {
        string name = 1;
        bool value  = 2;
    }

    string extensions      = 1;
    uint32 video_encodings = 2;
    uint32 audio_encodings = 3;
    OsType os_type         = 4;
    repeated Flag flag     = 5;
}

enum ConfigFlags
{
    NO_FLAGS               = 0;
    ENABLE_CURSOR_SHAPE    = 1;
    ENABLE_CLIPBOARD       = 2;
    DISABLE_EFFECTS        = 4;
    DISABLE_WALLPAPER      = 8;
    // DISABLE_FONT_SMOOTHING (16) is deprecated.
    BLOCK_REMOTE_INPUT     = 32;
    LOCK_AT_DISCONNECT     = 64;
    CURSOR_POSITION        = 128;
    // CLEAR_CLIPBOARD (256) is deprecated.
}

message Config
{
    uint32 flags                  = 1;
    video.Encoding video_encoding = 2;
    // Field 3 (pixel format) is deprecated.
    // Field 4 is deprecated.
    // Field 5 (compress ratio) is deprecated.
    // Field 6 is deprecated.
    audio.Encoding audio_encoding = 7;
}

// Client <- Host (channel 0).
message SessionToClient
{
    video.Packet video_packet       = 1;
    audio.Packet audio_packet       = 2;
    cursor.Shape cursor_shape       = 3;
    clipboard.Event clipboard_event = 4;
    Extension extension             = 5;
    Capabilities capabilities       = 6;
    cursor.Position cursor_position = 7;
}

// Client -> Host (channel 0).
message ClientToSession
{
    input.MouseEvent mouse_event    = 1;
    input.KeyEvent key_event        = 2;
    input.TouchEvent touch_event    = 3;
    input.TextEvent text_event      = 4;
    clipboard.Event clipboard_event = 5;
    Extension extension             = 6;
    Config config                   = 7;
    audio.Packet audio_packet       = 8;
}
