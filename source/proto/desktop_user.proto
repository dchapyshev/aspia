syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.user;

message VideoRecording
{
    enum Action
    {
        ACTION_UNKNOWN = 0;
        ACTION_STARTED = 1;
        ACTION_STOPPED = 2;
    }

    Action action = 1;
}

message ClientToHost
{
    VideoRecording video_recording = 1;
}
