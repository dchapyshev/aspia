syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "router.proto";

package proto.router;

message StunServerInfo
{
    uint32 version = 1;
    string host    = 2;
    uint32 port    = 3;
}

message PeerInfo
{
    // If the opposite peer is outdated (version less than 3), then it is set to true.
    bool is_legacy = 1;

    // If the external address of the peers visible to the router matches, then it is set to true.
    bool is_address_equals = 2;
}

message ConnectionOffer
{
    enum ErrorCode
    {
        SUCCESS        = 0;
        UNKNOWN_ERROR  = 1;
        PEER_NOT_FOUND = 2;
        ACCESS_DENIED  = 3;
        KEY_POOL_EMPTY = 4;
    }

    int64 request_id         = 1;
    ErrorCode error_code     = 2;
    RelayCredentials relay   = 3;
    StunServerInfo stun_info = 4;
    PeerInfo peer_info       = 5;
}
