syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.desktop;

// Sent by client to host.
message PowerControl
{
    enum Action
    {
        ACTION_UNKNOWN          = 0;
        ACTION_SHUTDOWN         = 1;
        ACTION_REBOOT           = 2;
        ACTION_LOGOFF           = 3;
        ACTION_LOCK             = 4;
        ACTION_REBOOT_SAFE_MODE = 5;
    }

    Action action = 1;
}

// Client -> Host (channel 7).
message PowerData
{
    PowerControl power_control = 1;
}
