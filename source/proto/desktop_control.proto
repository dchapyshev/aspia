syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.control;

message Size
{
    int32 width  = 1;
    int32 height = 2;
}

message Capabilities
{
    message Flag
    {
        string name = 1;
        bool value  = 2;
    }

    repeated Flag flag = 1;
}

message SwitchSession
{
    uint32 session_id = 1;
}

message Session
{
    uint32 session_id   = 1;
    string domain_name  = 2;
    string user_name    = 3;
    bool is_locked      = 5;
    bool is_active      = 6;
}

message SessionList
{
    repeated Session session  = 1;
    uint32 current_session_id = 2;
    uint32 console_session_id = 3;
}

message SessionsRequest
{
    uint32 dummy = 1; // Always set to 1.
}

message Config
{
    Size preferred_resolution = 1;
    Size preferred_size       = 2;
    bool audio                = 3;
    bool cursor_shape         = 4;
    bool cursor_position      = 5;
    bool clipboard            = 6;
    bool effects              = 7;
    bool wallpaper            = 8;
    bool block_input          = 9;
    bool lock_at_disconnect   = 10;
}

message Feedback
{
    string command_name = 1;

    oneof value
    {
        int64 signed_integer    = 2;
        uint64 unsigned_integer = 3;
        bool boolean            = 4;
        string utf8_string      = 5;
    }
}

// Client <- Host (channel 1).
message HostToClient
{
    Capabilities capabilities = 1;
    SessionList session_list  = 2;
}

// Client -> Host (channel 1).
message ClientToHost
{
    Capabilities capabilities        = 1;
    Config config                    = 2;
    SessionsRequest sessions_request = 3;
    SwitchSession switch_session     = 4;
    Feedback feedback                = 5;
}
