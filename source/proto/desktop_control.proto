syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.control;

message Capabilities
{
    message Flag
    {
        string name = 1;
        bool value  = 2;
    }

    repeated Flag flag = 1;
}

message SwitchSession
{
    uint32 session_id = 1;
}

message Session
{
    uint32 session_id   = 1;
    string domain_name  = 2;
    string user_name    = 3;
    bool is_locked      = 5;
    bool is_active      = 6;
}

message SessionList
{
    repeated Session session  = 1;
    uint32 current_session_id = 2;
    uint32 console_session_id = 3;
}

message SessionListRequest
{
    uint32 dummy = 1; // Always set to 1.
}

message Config
{
    bool audio              = 1;
    bool cursor_shape       = 2;
    bool cursor_position    = 3;
    bool clipboard          = 4;
    bool effects            = 5;
    bool wallpaper          = 6;
    bool block_input        = 7;
    bool lock_at_disconnect = 8;
}

// Client <- Host (channel 1).
message HostToClient
{
    Capabilities capabilities = 1;
    SessionList session_list  = 2;
}

// Client -> Host (channel 1).
message ClientToHost
{
    Capabilities capabilities               = 1;
    Config config                           = 2;
    SessionListRequest session_list_request = 3;
    SwitchSession switch_session            = 4;
}
