syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "desktop_audio.proto";
import "desktop_video.proto";

package proto.control;

message Capabilities
{
    enum OsType
    {
        OS_TYPE_WINDOWS = 0;
        OS_TYPE_LINUX   = 1;
        OS_TYPE_MACOSX  = 2;
        OS_TYPE_ANDROID = 3;
        OS_TYPE_IOS     = 4;
    }

    message Flag
    {
        string name = 1;
        bool value  = 2;
    }

    uint32 video_encodings = 1;
    uint32 audio_encodings = 2;
    OsType os_type         = 3;
    repeated Flag flag     = 4;
}

message SwitchSession
{
    uint32 session_id = 1;
}

message Session
{
    uint32 session_id   = 1;
    string domain_name  = 2;
    string user_name    = 3;
    bool is_locked      = 5;
    bool is_active      = 6;
}

message SessionList
{
    repeated Session session  = 1;
    uint32 current_session_id = 2;
    uint32 console_session_id = 3;
}

message SessionListRequest
{
    uint32 dummy = 1; // Always set to 1.
}

message Config
{
    video.Encoding video_encoding = 1;
    audio.Encoding audio_encoding = 2;
    bool cursor_shape             = 3;
    bool cursor_position          = 4;
    bool clipboard                = 5;
    bool effects                  = 6;
    bool wallpaper                = 7;
    bool block_input              = 8;
    bool lock_at_disconnect       = 9;
}

// Client <- Host (channel 1).
message HostToClient
{
    Capabilities capabilities = 1;
    SessionList session_list  = 2;
}

// Client -> Host (channel 1).
message ClientToHost
{
    Config config                           = 1;
    SessionListRequest session_list_request = 2;
    SwitchSession switch_session            = 3;
}
