syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "desktop_audio.proto";
import "desktop_video.proto";

package proto.control;

message Capabilities
{
    enum OsType
    {
        OS_TYPE_WINDOWS = 0;
        OS_TYPE_LINUX   = 1;
        OS_TYPE_MACOSX  = 2;
    }

    message Flag
    {
        string name = 1;
        bool value  = 2;
    }

    string extensions      = 1;
    uint32 video_encodings = 2;
    uint32 audio_encodings = 3;
    OsType os_type         = 4;
    repeated Flag flag     = 5;
}

enum ConfigFlags
{
    NO_FLAGS               = 0;
    ENABLE_CURSOR_SHAPE    = 1;
    ENABLE_CLIPBOARD       = 2;
    DISABLE_EFFECTS        = 4;
    DISABLE_WALLPAPER      = 8;
    // DISABLE_FONT_SMOOTHING (16) is deprecated.
    BLOCK_REMOTE_INPUT     = 32;
    LOCK_AT_DISCONNECT     = 64;
    CURSOR_POSITION        = 128;
    // CLEAR_CLIPBOARD (256) is deprecated.
}

message SwitchSession
{
    uint32 session_id = 1;
}

message Session
{
    uint32 session_id   = 1;
    string domain_name  = 2;
    string user_name    = 3;
    bool is_locked      = 5;
    bool is_active      = 6;
}

message SessionList
{
    repeated Session session  = 1;
    uint32 current_session_id = 2;
    uint32 console_session_id = 3;
}

message SessionListRequest
{
    uint32 dummy = 1; // Always set to 1.
}

message VideoRecording
{
    enum Action
    {
        ACTION_UNKNOWN = 0;
        ACTION_STARTED = 1;
        ACTION_STOPPED = 2;
    }

    Action action = 1;
}

message Config
{
    uint32 flags                  = 1;
    video.Encoding video_encoding = 2;
    // Field 3 (pixel format) is deprecated.
    // Field 4 is deprecated.
    // Field 5 (compress ratio) is deprecated.
    // Field 6 is deprecated.
    audio.Encoding audio_encoding = 7;
}

// Client <- Host (channel 1).
message HostToClient
{
    Capabilities capabilities = 1;
    SessionList session_list  = 2;
}

// Client -> Host (channel 1).
message ClientToHost
{
    Config config                           = 1;
    SessionListRequest session_list_request = 2;
    SwitchSession switch_session            = 3;
    VideoRecording video_recording          = 4;
}
