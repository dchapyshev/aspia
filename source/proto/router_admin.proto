syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "peer.proto";
import "router.proto";

package proto.router;

message RelayInfo
{
    message Statistics
    {
        repeated Peer peer = 1;
        int64 uptime       = 2;
    }

    int64 entry_id        = 1;
    int64 timepoint       = 2;
    string ip_address     = 3;
    peer.Version version  = 4;
    string os_name        = 5;
    string computer_name  = 6;
    string architecture   = 7;
    int64 pool_size       = 8;
    Statistics statistics = 9;
}

message HostInfo
{
    int64 entry_id       = 1;
    int64 timepoint      = 2;
    string ip_address    = 3;
    peer.Version version = 4;
    string os_name       = 5;
    string computer_name = 6;
    string architecture  = 7;
    uint64 host_id       = 8;
}

message ClientInfo
{
    int64 entry_id       = 1;
    int64 timepoint      = 2;
    string ip_address    = 3;
    peer.Version version = 4;
    string os_name       = 5;
    string computer_name = 6;
    string architecture  = 7;
}

message HostRequest
{
    string command_name = 1; // "disconnect" | "remove"
    int64 entry_id      = 2; // For "disconnect": -1 means all host sessions.
                             // For "remove": specific entry id.
    string params       = 3; // Additional parameters separated by ';'.
                             // For "remove": "try_to_uninstall"
}

message HostResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayRequest
{
    string command_name = 1; // "disconnect"
    int64 entry_id      = 2; // For "disconnect": -1 means all relay sessions.
    string params       = 3; // Reserved for future use.
}

message RelayResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayListRequest
{
    int64 dummy = 1;
}

message RelayList
{
    string error_code        = 1;
    repeated RelayInfo relay = 2;
}

message HostListRequest
{
    int64 dummy = 1;
}

message HostList
{
    string error_code      = 1;
    repeated HostInfo host = 2;
}

message ClientRequest
{
    string command_name = 1; // "disconnect"
    int64 entry_id      = 2; // For "disconnect": -1 means all client sessions.
    string params       = 3; // Reserved for future use.
}

message ClientResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message ClientListRequest
{
    int64 dummy = 1;
}

message ClientList
{
    string error_code          = 1;
    repeated ClientInfo client = 2;
}

message User
{
    int64 entry_id         = 1;
    string name            = 2;
    string group           = 3;
    bytes salt             = 4;
    bytes verifier         = 5;
    uint32 sessions        = 6;
    uint32 flags           = 7;
    bytes public_key       = 8;
    bytes wrap_private_key = 9;
    bytes wrap_salt        = 10;
}

message UserListRequest
{
    uint32 dummy = 1;
}

message UserList
{
    string error_code  = 1; // "ok" | "internal_error"
    repeated User user = 2;
}

message UserRequest
{
    string command_name = 1; // "add" | "modify" | "delete"
    User user           = 2;
}

message UserResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_data" | "already_exists"
}

message WorkspaceAccess
{
    int64 user_id    = 1;
    bytes wrapped_gk = 2;
}

message Workspace
{
    int64 entry_id                  = 1;
    string name                     = 2;
    repeated WorkspaceAccess access = 3;
}

message WorkspaceListRequest
{
    uint32 dummy = 1;
}

message WorkspaceList
{
    string error_code            = 1; // "ok" | "internal_error"
    repeated Workspace workspace = 2;
}

message WorkspaceRequest
{
    // "add"    - Workspace with name and full initial access list (each entry has user_id +
    //            wrapped_gk). Empty access list is allowed; the workspace has no GK until the
    //            first access is granted via "modify".
    // "modify" - Workspace with entry_id, new name and the full desired access list. Server
    //            computes the diff against the current state: for user_ids not yet present in
    //            DB it inserts the supplied wrapped_gk, for user_ids missing from the request
    //            it removes the access record. For user_ids already present wrapped_gk in the
    //            request is ignored (existing wrapped_gk is preserved).
    // "delete" - Workspace with entry_id.
    string command_name = 1;
    Workspace workspace = 2;
}

message WorkspaceResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_data" |
                             // "already_exists" | "not_found"
    int64 entry_id      = 3; // Id of created workspace for "add".
}

message RouterToAdmin
{
    RelayList relay_list             = 1;
    RelayResult relay_result         = 2;
    HostList host_list               = 3;
    HostResult host_result           = 4;
    ClientList client_list           = 5;
    ClientResult client_result       = 6;
    UserList user_list               = 7;
    UserResult user_result           = 8;
    WorkspaceList workspace_list     = 9;
    WorkspaceResult workspace_result = 10;
}

message AdminToRouter
{
    RelayListRequest relay_list_request         = 1;
    RelayRequest relay_request                  = 2;
    HostListRequest host_list_request           = 3;
    HostRequest host_request                    = 4;
    ClientListRequest client_list_request       = 5;
    ClientRequest client_request                = 6;
    UserListRequest user_list_request           = 7;
    UserRequest user_request                    = 8;
    PeerRequest peer_request                    = 9;
    WorkspaceListRequest workspace_list_request = 10;
    WorkspaceRequest workspace_request          = 11;
}
