syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "peer.proto";
import "router.proto";
import "router_client.proto";

package proto.router;

// Every request/response pair below carries request_id - the client allocates a unique value
// per outbound request and the server echoes it back on the corresponding response. The
// dispatcher on the client uses it to route the response to the originating caller.

message RelayInfo
{
    message Statistics
    {
        repeated Peer peer = 1;
        int64 uptime       = 2;
    }

    int64 entry_id        = 1;
    int64 timepoint       = 2;
    string ip_address     = 3;
    peer.Version version  = 4;
    string os_name        = 5;
    string computer_name  = 6;
    string architecture   = 7;
    int64 pool_size       = 8;
    Statistics statistics = 9;
}

message ClientInfo
{
    int64 entry_id       = 1;
    int64 timepoint      = 2;
    string ip_address    = 3;
    peer.Version version = 4;
    string os_name       = 5;
    string computer_name = 6;
    string architecture  = 7;
}

message HostRequest
{
    int64 request_id    = 1;
    string command_name = 2; // "disconnect" | "remove"
    int64 host_id       = 3; // For "disconnect": -1 means all host sessions, otherwise the host
                             // session is looked up by host_id (hosts.id).
                             // For "remove": host_id of the host to uninstall.
    string params       = 4; // Additional parameters separated by ';'. Currently unused.
}

message HostResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayRequest
{
    int64 request_id    = 1;
    string command_name = 2; // "disconnect"
    int64 entry_id      = 3; // For "disconnect": -1 means all relay sessions.
    string params       = 4; // Reserved for future use.
}

message RelayResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayListRequest
{
    int64 request_id = 1;
}

message RelayList
{
    int64 request_id         = 1;
    string error_code        = 2;
    repeated RelayInfo relay = 3;
}

message ClientRequest
{
    int64 request_id    = 1;
    string command_name = 2; // "disconnect"
    int64 entry_id      = 3; // For "disconnect": -1 means all client sessions.
    string params       = 4; // Reserved for future use.
}

message ClientResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message ClientListRequest
{
    int64 request_id = 1;
}

message ClientList
{
    int64 request_id           = 1;
    string error_code          = 2;
    repeated ClientInfo client = 3;
}

message User
{
    int64 entry_id         = 1;
    string name            = 2;
    string group           = 3;
    bytes salt             = 4;
    bytes verifier         = 5;
    uint32 sessions        = 6;
    uint32 flags           = 7;
    bytes public_key       = 8;
    bytes wrap_private_key = 9;
    bytes wrap_salt        = 10;
}

message UserListRequest
{
    int64 request_id = 1;
}

message UserList
{
    int64 request_id   = 1;
    string error_code  = 2; // "ok" | "internal_error"
    repeated User user = 3;
}

message UserRequest
{
    int64 request_id    = 1;
    string command_name = 2; // "add" | "modify" | "delete"
    User user           = 3;
}

message UserResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_data" | "already_exists"
}

message WorkspaceRequest
{
    // "add"    - Workspace with name and full initial access list (each entry has user_id +
    //            wrapped_gk). Empty access list is allowed; the workspace has no GK until the
    //            first access is granted via "modify".
    // "modify" - Workspace with entry_id, new name and the full desired access list. Server
    //            computes the diff against the current state: for user_ids not yet present in
    //            DB it inserts the supplied wrapped_gk, for user_ids missing from the request
    //            it removes the access record. For user_ids already present wrapped_gk in the
    //            request is ignored (existing wrapped_gk is preserved).
    // "delete" - Workspace with entry_id.
    int64 request_id    = 1;
    string command_name = 2;
    Workspace workspace = 3;
}

message WorkspaceResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_data" |
                             // "already_exists" | "not_found"
    int64 entry_id      = 4; // Id of created workspace for "add".
}

message RouterToAdmin
{
    RelayList relay_list             = 1;
    RelayResult relay_result         = 2;
    HostResult host_result           = 3;
    ClientList client_list           = 4;
    ClientResult client_result       = 5;
    UserList user_list               = 6;
    UserResult user_result           = 7;
    WorkspaceResult workspace_result = 8;
}

message AdminToRouter
{
    RelayListRequest relay_list_request   = 1;
    RelayRequest relay_request            = 2;
    HostRequest host_request              = 3;
    ClientListRequest client_list_request = 4;
    ClientRequest client_request          = 5;
    UserListRequest user_list_request     = 6;
    UserRequest user_request              = 7;
    PeerRequest peer_request              = 8;
    WorkspaceRequest workspace_request    = 9;
}
