syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "peer.proto";
import "router.proto";

package proto.router;

message RelayInfo
{
    message Statistics
    {
        repeated PeerConnection peer = 1;
        int64 uptime = 2;
    }

    int64 entry_id        = 1;
    int64 timepoint       = 2;
    string ip_address     = 3;
    peer.Version version  = 4;
    string os_name        = 5;
    string computer_name  = 6;
    string architecture   = 7;
    int64 pool_size       = 8;
    Statistics statistics = 9;
}

message HostInfo
{
    int64 entry_id       = 1;
    int64 timepoint      = 2;
    string ip_address    = 3;
    peer.Version version = 4;
    string os_name       = 5;
    string computer_name = 6;
    string architecture  = 7;
    uint64 host_id       = 8;
}

message Session
{
    int64 session_id         = 1;
    SessionType session_type = 2;
    bytes session_data       = 3;
    fixed64 timepoint        = 4;
    string ip_address        = 5;
    peer.Version version     = 6;
    string os_name           = 7;
    string computer_name     = 8;
    string architecture      = 9;
}

// deprecated
enum SessionRequestType
{
    SESSION_REQUEST_UNKNOWN    = 0;
    SESSION_REQUEST_DISCONNECT = 1;
}

// deprecated
message SessionRequest
{
    SessionRequestType type = 1;
    int64 session_id        = 2;
}

// deprecated
message SessionResult
{
    enum ErrorCode
    {
        SUCCESS            = 0;
        INVALID_REQUEST    = 1;
        INTERNAL_ERROR     = 2;
        INVALID_SESSION_ID = 3;
    }

    SessionRequestType type    = 1;
    ErrorCode error_code       = 2;
}

// deprecated
message SessionListRequest
{
    int64 dummy = 1;
}

// deprecated
message SessionList
{
    enum ErrorCode
    {
        SUCCESS       = 0;
        UNKNOWN_ERROR = 1;
    }

    ErrorCode error_code     = 1;
    repeated Session session = 2;
}

message HostRequest
{
    string type      = 1; // "disconnect" | "disconnect_all"
    int64 session_id = 2; // Used only for "disconnect".
}

message HostResult
{
    string type       = 1; // Same as request type.
    string error_code = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayListRequest
{
    int64 dummy = 1;
}

message RelayList
{
    string error_code        = 1;
    repeated RelayInfo relay = 2;
}

message HostListRequest
{
    int64 dummy = 1;
}

message HostList
{
    string error_code      = 1;
    repeated HostInfo host = 2;
}

message HostSessionData
{
    repeated fixed64 host_id = 1;
}

message RelaySessionData
{
    message RelayStat
    {
        repeated PeerConnection peer_connection = 1;
        int64 uptime = 2;
    }

    uint64 pool_size = 1;
    RelayStat relay_stat = 2;
}

message User
{
    int64 entry_id  = 1;
    string name     = 2;
    string group    = 3;
    bytes salt      = 4;
    bytes verifier  = 5;
    uint32 sessions = 6;
    uint32 flags    = 7;
}

message UserListRequest
{
    uint32 dummy = 1;
}

message UserList
{
    enum ErrorCode
    {
        SUCCESS       = 0;
        UNKNOWN_ERROR = 1;
    }

    ErrorCode error_code = 1;
    repeated User user   = 2;
}

enum UserRequestType
{
    USER_REQUEST_UNKNOWN = 0;
    USER_REQUEST_ADD     = 1;
    USER_REQUEST_MODIFY  = 2;
    USER_REQUEST_DELETE  = 3;
}

message UserRequest
{
    UserRequestType type = 1;
    User user            = 2;
}

message UserResult
{
    enum ErrorCode
    {
        SUCCESS        = 0;
        INTERNAL_ERROR = 1;
        INVALID_DATA   = 2;
        ALREADY_EXISTS = 3;
    }

    UserRequestType type = 1;
    ErrorCode error_code = 2;
}

message RemoveHostRequest
{
    enum Flags
    {
        NO_FLAGS         = 0;
        REMOVE_SETTINGS  = 1;
        TRY_TO_UNINSTALL = 2;
    }

    int64 session_id = 1;
    uint32 flags     = 2;
}

message RouterToAdmin
{
    RelayList relay_list         = 1;
    HostList host_list           = 2;
    SessionList session_list     = 3; // deprecated
    SessionResult session_result = 4; // deprecated
    UserList user_list           = 5;
    UserResult user_result       = 6;
    HostResult host_result       = 7;
}

message AdminToRouter
{
    RelayListRequest relay_list_request           = 1;
    HostListRequest host_list_request             = 2;
    SessionListRequest session_list_request       = 3; // deprecated
    SessionRequest session_request                = 4; // deprecated
    UserListRequest user_list_request             = 5;
    UserRequest user_request                      = 6;
    PeerConnectionRequest peer_connection_request = 7;
    RemoveHostRequest remove_host_request         = 8;
    HostRequest host_request                      = 9;
}
