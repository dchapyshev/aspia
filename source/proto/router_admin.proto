syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "peer.proto";
import "router.proto";

package proto.router;

message RelayInfo
{
    message Statistics
    {
        repeated Peer peer = 1;
        int64 uptime = 2;
    }

    int64 entry_id        = 1;
    int64 timepoint       = 2;
    string ip_address     = 3;
    peer.Version version  = 4;
    string os_name        = 5;
    string computer_name  = 6;
    string architecture   = 7;
    int64 pool_size       = 8;
    Statistics statistics = 9;
}

message HostInfo
{
    int64 entry_id       = 1;
    int64 timepoint      = 2;
    string ip_address    = 3;
    peer.Version version = 4;
    string os_name       = 5;
    string computer_name = 6;
    string architecture  = 7;
    uint64 host_id       = 8;
}

message HostRequest
{
    string command_name = 1; // "disconnect" | "remove"
    int64 entry_id      = 2; // For "disconnect": -1 means all host sessions.
                             // For "remove": specific entry id.
    string params       = 3; // Additional parameters separated by ';'.
                             // For "remove": "try_to_uninstall"
}

message HostResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayRequest
{
    string command_name = 1; // "disconnect"
    int64 entry_id      = 2; // For "disconnect": -1 means all relay sessions.
    string params       = 3; // Reserved for future use.
}

message RelayResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_entry_id"
}

message RelayListRequest
{
    int64 dummy = 1;
}

message RelayList
{
    string error_code        = 1;
    repeated RelayInfo relay = 2;
}

message HostListRequest
{
    int64 dummy = 1;
}

message HostList
{
    string error_code      = 1;
    repeated HostInfo host = 2;
}

message User
{
    int64 entry_id  = 1;
    string name     = 2;
    string group    = 3;
    bytes salt      = 4;
    bytes verifier  = 5;
    uint32 sessions = 6;
    uint32 flags    = 7;
}

message UserListRequest
{
    uint32 dummy = 1;
}

message UserList
{
    string error_code  = 1; // "ok" | "internal_error"
    repeated User user = 2;
}

message UserRequest
{
    string command_name = 1; // "add" | "modify" | "delete"
    User user           = 2;
}

message UserResult
{
    string command_name = 1; // Same as request command_name.
    string error_code   = 2; // "ok" | "invalid_request" | "internal_error" | "invalid_data" | "already_exists"
}

message RouterToAdmin
{
    RelayList relay_list     = 1;
    RelayResult relay_result = 2;
    HostList host_list       = 3;
    HostResult host_result   = 4;
    UserList user_list       = 5;
    UserResult user_result   = 6;
}

message AdminToRouter
{
    RelayListRequest relay_list_request = 1;
    RelayRequest relay_request          = 2;
    HostListRequest host_list_request   = 3;
    HostRequest host_request            = 4;
    UserListRequest user_list_request   = 5;
    UserRequest user_request            = 6;
    PeerRequest peer_request            = 7;
}
