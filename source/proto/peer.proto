syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.peer;

enum ChannelId
{
    CHANNEL_ID_0       = 0; // Basic session data.
    CHANNEL_ID_1       = 1; // Service session data.
    CHANNEL_ID_2       = 2; // Depends on session implementation.
    CHANNEL_ID_3       = 3; // Depends on session implementation.
    CHANNEL_ID_4       = 4; // Depends on session implementation.
    CHANNEL_ID_5       = 5; // Depends on session implementation.
    CHANNEL_ID_CONTROL = 254;
}

enum SessionType
{
    SESSION_TYPE_UNKNOWN       = 0;
    SESSION_TYPE_DESKTOP       = 1;
    // SESSION_TYPE_DESKTOP_VIEW (2) deprecated.
    SESSION_TYPE_FILE_TRANSFER = 4;
    SESSION_TYPE_SYSTEM_INFO   = 8;
    SESSION_TYPE_CHAT          = 16;
    SESSION_TYPE_TERMINAL      = 32;

    // When adding or removing session types, you need to recalculate this value.
    SESSION_TYPE_ALL           = 63;
}

message Version
{
    uint32 major    = 1;
    uint32 minor    = 2;
    uint32 patch    = 3;
    uint32 revision = 4;
}

// Direct connection: the client connects to one of the host's addresses (LAN / no NAT) or to an
// endpoint the host mapped on its own gateway. |gateway| tells the two apart, since both reach
// the client as a direct connection to an advertised endpoint.
message DirectUdpRequest
{
    uint32 request_id       = 1;
    repeated string address = 2;
    uint32 port             = 3;
    uint32 encryptions      = 4;
    bytes public_key        = 5;
    bytes iv                = 6;
    bool gateway            = 7;
}

// STUN hole punching: the client runs its own STUN against the given server, then connects to the
// host's external endpoint.
message StunUdpRequest
{
    uint32 request_id       = 1;
    repeated string address = 2;
    uint32 port             = 3;
    uint32 encryptions      = 4;
    bytes public_key        = 5;
    bytes iv                = 6;
    string stun_host        = 7;
    uint32 stun_port        = 8;
}

// The client opens a port mapping on its gateway (NAT-PMP or UPnP) and listens; the host connects
// to the reported endpoint. Fallback when the host is behind a symmetric NAT.
message GatewayUdpRequest
{
    uint32 request_id  = 1;
    uint32 encryptions = 2;
    bytes public_key   = 3;
    bytes iv           = 4;
}

// The client's answer to any of the UDP requests above: session crypto plus, when the host needs
// to reach the client (STUN or gateway mapping), the client's external endpoint.
message UdpReply
{
    uint32 request_id = 1; // Echoes the request_id of the request this reply answers.
    uint32 encryption = 2;
    bytes public_key  = 3;
    bytes iv          = 4;
    string address    = 5;
    uint32 port       = 6;
}

// One probe of a packet train. The train members are sent back to back, so the spacing of their
// arrivals at the receiver reflects the bottleneck rate of the path (independent of the RTT, which
// a single request/response probe would measure instead).
message BandwidthProbe
{
    uint32 train_id = 1; // Identifies the train this probe belongs to.
    uint32 index    = 2; // 0-based position within the train.
    uint32 count    = 3; // Total number of probes in the train.
    bytes payload   = 4;
}

// The receiver's report for a probe train: how long the train took to arrive and how much of it
// arrived after the first probe. Bottleneck bandwidth = bytes / delta.
message BandwidthProbeAck
{
    uint32 train_id = 1;
    uint64 delta_us = 2; // Time between the arrival of the first and the last received probe.
    uint64 bytes    = 3; // Payload bytes received after the first probe.
}

// Periodic receive-rate report: how many bytes of session traffic actually arrived at the client
// over the last interval. When the host's send queue is backed up this is a direct measurement of
// the path capacity under real load; when the queue is empty it is a lower bound.
message ReceiveRate
{
    uint64 bytes       = 1;
    uint32 interval_ms = 2;
}

// Use CHANNEL_ID_CONTROL to send.
message ClientToHost
{
    UdpReply udp_reply                    = 1;
    BandwidthProbeAck bandwidth_probe_ack = 2;
    ReceiveRate receive_rate              = 3;
}

// Use CHANNEL_ID_CONTROL to send.
message HostToClient
{
    DirectUdpRequest direct_udp_request   = 1;
    StunUdpRequest stun_udp_request       = 2;
    GatewayUdpRequest gateway_udp_request = 3;
    BandwidthProbe bandwidth_probe        = 4;
}
