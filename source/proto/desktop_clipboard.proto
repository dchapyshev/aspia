syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.clipboard;

message Event
{
    message FileList
    {
        message File
        {
            string path       = 1;
            bool is_dir       = 2;
            int64 file_size   = 3;
            int64 create_time = 4;
            int64 access_time = 5;
            int64 modify_time = 6;
        }

        repeated File file = 1;
    }

    string mime_type = 1;
    bytes data = 2;
}

// Client -> Host (channel 6).
message ClientToHost
{
    Event event = 1;
}

// Client -> Host (channel 6).
message HostToClient
{
    Event event = 1;
}
