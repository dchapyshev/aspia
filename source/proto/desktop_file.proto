syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.file;

message Request
{
    uint64 transfer_id = 1;
    int32 file_index   = 2;
    uint64 offset      = 3;
}

message Data
{
    uint64 transfer_id = 1;
    int32 file_index   = 2;
    bytes data         = 3;
    bool is_last       = 4;
}

message Cancel
{
    uint64 transfer_id = 1;
}

message Error
{
    uint64 transfer_id = 1;
    int32 file_index   = 2;
    string error_id    = 3;
}

// Bidirectional file transfer message (channel 10).
message Message
{
    Request request = 1;
    Data data       = 2;
    Cancel cancel   = 3;
    Error error     = 4;
}
