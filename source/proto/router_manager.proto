syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "router_client.proto";

package proto.router;

message HostRequest
{
    // "disconnect" - Disconnect a connected host session. Only host.host_id is read;
    //                kAllHostsId disconnects all host sessions. Admin-only.
    // "remove"     - Schedule host uninstall and DB cleanup. Only host.host_id is read.
    //                Admin-only.
    // "modify"     - Update mutable host fields. host.host_id selects the target; host.group_id
    //                (== 0 keeps the host at the workspace root, otherwise must reference a
    //                group within the host's current workspace); host.display_name plain;
    //                host.comment/user_name/password AEAD-encrypted with the workspace GK by
    //                the caller. Other Host fields are ignored. Allowed for admin and manager.
    // "update"     - Force the host to check for updates immediately. Only host.host_id is read;
    //                the host must be online. Admin-only.
    int64 request_id    = 1;
    string command_name = 2;
    Host host           = 3;
}

message HostResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "invalid_data" | "invalid_entry_id" |
                             // "access_denied" | "not_found" | "internal_error"
}

message GroupRequest
{
    // "add"    - Group with workspace_id (in the wrapping field), parent_id, name and comment.
    //            Server fills entry_id in the result. parent_id == 0 places the group at the
    //            workspace root; otherwise parent_id must refer to an existing group of the
    //            same workspace.
    // "modify" - Group with entry_id, new parent_id (== 0 for the workspace root), name and
    //            comment. The new parent must belong to the same workspace and must not be
    //            the group itself or any of its descendants; otherwise the server returns
    //            "invalid_data". Renaming and re-parenting can be combined in one call.
    // "delete" - Group with entry_id. Descendants are removed by the foreign-key cascade;
    //            hosts whose group_id pointed into the deleted subtree are detached to the
    //            workspace root.
    // Allowed for admin and manager (manager must be a member of the target workspace).
    int64 request_id    = 1;
    string command_name = 2;
    int64 workspace_id  = 3;
    Group group         = 4;
}

message GroupResult
{
    int64 request_id    = 1;
    string command_name = 2; // Same as request command_name.
    string error_code   = 3; // "ok" | "invalid_request" | "internal_error" | "invalid_data" |
                             // "access_denied" | "not_found"
    int64 entry_id      = 4; // Id of the created group for "add".
}

message ManagerToRouter
{
    HostRequest host_request   = 1;
    GroupRequest group_request = 2;
}

message RouterToManager
{
    HostResult host_result   = 1;
    GroupResult group_result = 2;
}
