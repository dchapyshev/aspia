syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.cursor;

message Shape
{
    enum Flags
    {
        UNKNOWN     = 0;
        RESET_CACHE = 64;
        CACHE       = 128;
    }

    enum Type
    {
        TYPE_UNKNOWN         = 0;
        TYPE_ARROW           = 1;
        TYPE_UP_ARROW        = 2;
        TYPE_CROSS           = 3;
        TYPE_WAIT            = 4;
        TYPE_IBEAM           = 5;
        TYPE_SIZE_VERTICAL   = 6;
        TYPE_SIZE_HORIZONTAL = 7;
        TYPE_SIZE_BDIAG      = 8;
        TYPE_SIZE_FDIAG      = 9;
        TYPE_SIZE_ALL        = 10;
        TYPE_POINTING_HAND   = 11;
        TYPE_FORBIDDEN       = 12;
        TYPE_WHATS_THIS      = 13;
        TYPE_BUSY            = 14;
    }

    // We use only the first byte in this field.
    // If bit 7 is set to 1, then bits 0-4 contain the cursor index in the cache.
    // If bit 7 is not set, then the cursor image is received.
    // If bit 6 is set to 1, then the command to reset the contents of the cache
    // is received, and bits 0-4 contain a new cache size.
    // Bit 5 is reserved.
    uint32 flags = 1;

    // Width, height (in screen pixels) of the cursor.
    int32 width  = 2;
    int32 height = 3;

    // X,Y coordinates (relative to upper-left corner) of the cursor hotspot.
    int32 hotspot_x = 4;
    int32 hotspot_y = 5;

    // Cursor pixmap data in 32-bit BGRA format compressed with Zstd.
    bytes data = 6;

    // Screen DPI for current cursor.
    int32 dpi_x = 7;
    int32 dpi_y = 8;

    // Cursor shape type.
    Type type = 9;
}

message Position
{
    int32 x = 1;
    int32 y = 2;
}

// Client <- Host (channel 4).
message HostToClient
{
    Shape shape       = 1;
    Position position = 2;
}
