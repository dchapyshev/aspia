syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.desktop;

message SwitchSession
{
    uint32 session_id = 1;
}

message Session
{
    uint32 session_id   = 1;
    string domain_name  = 2;
    string user_name    = 3;
    bool is_locked      = 5;
    bool is_active      = 6;
}

message SessionList
{
    repeated Session session  = 1;
    uint32 current_session_id = 2;
    uint32 console_session_id = 3;
}

message SessionListRequest
{
    uint32 dummy = 1; // Always set to 1.
}

message VideoRecording
{
    enum Action
    {
        ACTION_UNKNOWN = 0;
        ACTION_STARTED = 1;
        ACTION_STOPPED = 2;
    }

    Action action = 1;
}

message ServiceToClient
{
    SessionList session_list = 1;
}

message ClientToService
{
    SessionListRequest session_list_request = 1;
    SwitchSession switch_session            = 2;
    VideoRecording video_recording          = 3;
}
