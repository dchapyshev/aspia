syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.video;

message Size
{
    int32 width  = 1;
    int32 height = 2;
}

message Rect
{
    int32 x      = 1;
    int32 y      = 2;
    int32 width  = 3;
    int32 height = 4;
}

// Identifies how the image was encoded.
enum Encoding
{
    ENCODING_UNKNOWN = 0;
    // Field 1 (ZSTD) is deprecated.
    ENCODING_VP8     = 2;
    ENCODING_VP9     = 4;
}

message PacketFormat
{
    Rect video_rect          = 1;
    // Field 2 (pixel format) is deprecated.
    Size screen_size         = 3;
    uint32 capturer_type     = 4;
}

enum ErrorCode
{
    ERROR_CODE_OK        = 0;
    ERROR_CODE_PAUSED    = 1;
    ERROR_CODE_TEMPORARY = 2;
    ERROR_CODE_PERMANENT = 3;
}

enum PacketFlags
{
    PACKET_FLAG_NONE         = 0;
    PACKET_FLAG_IS_KEY_FRAME = 1;
}

// Sent by host to client.
message Packet
{
    Encoding encoding = 1;

    // If the screen size or the pixel format has changed, the field must be filled.
    PacketFormat format = 2;

    // The list of changed rectangles (areas) of the screen.
    repeated Rect dirty_rect = 3;

    // Video packet data.
    bytes data = 4;

    // If there is no error, then it takes the value VIDEO_ERROR_CODE_OK.
    // If the field has any other value, then all other fields are ignored.
    ErrorCode error_code = 5;

    // Flags for the video packet.
    uint32 flags = 6;
}

// Sent by client to host.
message KeyFrameRequest
{
    uint32 dummy = 1;
}

// Sent by client to host.
message Pause
{
    bool enable  = 1;
    uint32 dummy = 2;
}

// Sent by client to host.
message PreferredSize
{
    int32 width = 1;
    int32 height = 2;
}

// Client <- Host (channel 3).
message Data
{
    Packet packet = 1;
}

// Client -> Host (channel 3).
message Control
{
    KeyFrameRequest key_frame    = 1;
    PreferredSize preferred_size = 2;
    Pause pause                  = 3;
}

