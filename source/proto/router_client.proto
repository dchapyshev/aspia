syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "router_peer.proto";
import "peer.proto";

package proto.router;

// Credentials of the authenticated user, pushed by the router right after the session is
// established so the client can derive its private key (via password + wrap_salt) and perform
// workspace-scoped crypto operations without having to retrieve the admin user list.
message UserKeys
{
    message WorkspaceKey
    {
        int64 workspace_id = 1;
        bytes wrapped_gk   = 2;
    }

    string router_guid                  = 1;
    int64 user_id                       = 2;
    string name                         = 3;
    bytes public_key                    = 4;
    bytes wrap_private_key              = 5;
    bytes wrap_salt                     = 6;
    repeated WorkspaceKey workspace_key = 7;
}

message WorkspaceAccess
{
    int64 user_id    = 1;
    bytes wrapped_gk = 2;
}

message Workspace
{
    int64 entry_id                  = 1;
    string name                     = 2;
    bytes comment                   = 3; // AEAD-encrypted with the workspace GK.
    repeated WorkspaceAccess access = 4;
    repeated uint64 host_id         = 5;
}

message WorkspaceListRequest
{
    int64 request_id   = 1;
    int64 workspace_id = 2; // 0 - all workspaces. > 0 - only the workspace with this workspace_id.
}

message WorkspaceList
{
    int64 request_id             = 1;
    string error_code            = 2; // "ok" | "internal_error"
    repeated Workspace workspace = 3;
}

message Group
{
    int64 entry_id  = 1; // groups_<workspace_id>.id
    int64 parent_id = 2; // 0 means the group sits at the workspace root.
    string name     = 3; // Plain text.
    bytes comment   = 4; // AEAD-encrypted with the workspace GK.
}

message GroupListRequest
{
    int64 request_id   = 1;
    int64 workspace_id = 2;
}

message GroupList
{
    int64 request_id     = 1;
    string error_code    = 2; // "ok" | "access_denied" | "internal_error"
    int64 workspace_id   = 3; // Echo of the request, so the client can route the response.
    repeated Group group = 4;
}

message ChangePasswordRequest
{
    message WorkspaceKey
    {
        int64 workspace_id = 1;
        bytes wrapped_gk   = 2;
    }

    int64 request_id       = 1;
    bytes salt             = 2;
    bytes verifier         = 3;
    bytes public_key       = 4;
    bytes wrap_private_key = 5;
    bytes wrap_salt        = 6;
    repeated WorkspaceKey workspace_key = 7;
}

message ChangePasswordResult
{
    int64 request_id  = 1;
    string error_code = 2; // "ok" | "invalid_request" | "invalid_data" | "internal_error"
}

message ConnectionRequest
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message CheckHostStatus
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message HostStatus
{
    enum Status
    {
        STATUS_UNKNOWN = 0;
        STATUS_OFFLINE = 1;
        STATUS_ONLINE  = 2;
    }

    int64 request_id     = 1;
    Status status        = 2;
    peer.Version version = 3;
}

message Host
{
    uint64 host_id       = 1;  // hosts.id - the dialable host identifier.
    int64 workspace_id   = 2;  // 0 means the host is not assigned to any workspace.
    int64 group_id       = 3;  // 0 means the host is at the workspace root.
    string display_name  = 4;  // Admin-editable display label (plain).
    string computer_name = 5;  // Plain OS hostname reported by the host.
    string cpu_arch      = 6;  // CPU architecture reported by the host.
    string version       = 7;  // Aspia version reported by the host.
    string os_name       = 8;  // Operating system name reported by the host.
    string address       = 9;  // Last seen peer address.
    bytes comment        = 10; // AEAD-encrypted with workspace GK.
    bytes user_name      = 11; // AEAD-encrypted with workspace GK.
    bytes password       = 12; // AEAD-encrypted with workspace GK.
    int64 last_connect   = 13; // Unix timestamp of the last connection.
    int64 last_modify    = 14; // Unix timestamp of the last edit by the admin.
    bool online          = 15; // Live host session currently exists for this host_id.
}

message HostListRequest
{
    enum Mode
    {
        MODE_UNKNOWN  = 0;
        MODE_ALL      = 1;
        MODE_FILTERED = 2;
    }

    int64 request_id   = 1;
    Mode mode          = 2;
    // Inclusive page range. Leaving both endpoints at 0 requests the unpaged mode;
    // any other range must be valid and bounded by the router.
    int64 start_item   = 3;
    int64 end_item     = 4;
    int64 workspace_id = 5;
    int64 group_id     = 6;
}

message HostList
{
    int64 request_id   = 1;
    string error_code  = 2; // "ok" | "access_denied" | "internal_error"
    int64 workspace_id = 3; // Echo of the request, so the client can route the response.
    int64 group_id     = 4; // Echo of the request.
    int64 total_count  = 5; // Total hosts in scope.
    repeated Host host = 6;
}

message HostSearchRequest
{
    int64 request_id = 1;
    string query     = 2;
}

message HostSearchResult
{
    int64 request_id   = 1;
    string error_code  = 2; // "ok" | "access_denied" | "internal_error"
    repeated Host host = 3;
}

message TempHost
{
    uint64 temp_id       = 1;
    string computer_name = 2;
    string version       = 3;
    string os_name       = 4;
    string address       = 5;
}

message TempHostListRequest
{
    int64 request_id = 1;
}

message TempHostList
{
    int64 request_id       = 1;
    string error_code      = 2; // "ok"
    repeated TempHost host = 3;
}

// Push notification from router to client/admin sessions: a coarse-grained signal that the
// indicated resource lists have changed since the last notification (or session start). The
// client refetches the affected lists via the existing list* RPCs. Notifications are batched
// on the router side and emitted at most once per ~5 seconds, with dirty bits OR-merged across
// events within the window.
message Notification
{
    bool temp_hosts_dirty = 1;
    bool hosts_dirty      = 2;
    bool relays_dirty     = 3;
    bool clients_dirty    = 4;
    bool users_dirty      = 5;
    bool workspaces_dirty = 6;
    bool groups_dirty     = 7;
}

// 2FA stage that runs between successful SRP authentication and the first UserKeys delivery.
// The router opens it from Client::onStarted() and gates UserKeys behind a successful
// TwoFactorResult. Because the SRP handshake is already complete, identity is confirmed and
// the stage cannot leak user existence: an attacker who failed SRP never reaches here. 2FA
// is mandatory: every user must either prove possession of an enrolled TOTP secret (or a
// valid device token derived from one) or self-enroll on first login.
//
// Flow:
//   1. Router picks |TwoFactorMode| based on the user's stored TOTP state and sends
//      TwoFactorChallenge (empty for MODE_ACTIVE; carrying |otpauth_uri| for MODE_ENROLL).
//   2. Client answers with TwoFactorResponse. In MODE_ACTIVE the client chooses by itself:
//      either (a) submit the |token| it stored after a previous TOTP success, or (b)
//      ask the user for a fresh |totp_code|.
//   3. Router validates the response. Any failure - a rejected code or a server-side error -
//      drops the connection with no reply; the client cannot retry on the same session, it
//      reconnects and runs the whole stage again. On success the router sends a TwoFactorResult
//      only when a TOTP submission produced a fresh |new_token|; the token-path success skips it.
//   4. On success the router proceeds to send UserKeys, which is what marks the stage complete.

enum TwoFactorMode
{
    TWO_FACTOR_MODE_UNKNOWN = 0;
    // User has a TOTP secret. The client may authenticate either by signing |server_nonce|
    // with a previously issued device key or by submitting a fresh TOTP code.
    TWO_FACTOR_MODE_ACTIVE  = 1;
    // User has no TOTP secret yet. The server includes |enrollment_secret| and |otpauth_uri|;
    // the client confirms by sending the first valid code.
    TWO_FACTOR_MODE_ENROLL  = 2;
}

// Router to client.
message TwoFactorChallenge
{
    TwoFactorMode mode = 1;

    // MODE_ENROLL: ready-to-use otpauth://totp/... URI for QR rendering. The Base32 secret
    // is embedded as the |secret| query parameter; the client extracts it from there for
    // the manual-entry fallback.
    string otpauth_uri = 2;

    // MODE_ACTIVE: set when the router rejected the |token| the client just presented
    // (revoked, password change, database wiped) and is asking for a TOTP code instead. The
    // client must drop the stale local token and proceed straight to the TOTP prompt without
    // re-trying the token path on this challenge.
    bool token_rejected = 3;
}

// Client to router.
message TwoFactorResponse
{
    // MODE_ACTIVE, token path: previously issued opaque token. When present the router
    // ignores |totp_code| and accepts the connection iff the token matches the
    // authenticated user. The token is bound to the client device by the OS keystore wrap
    // around its storage, so a copy of the client database moved to another machine cannot
    // present a usable token.
    bytes token = 1;

    // MODE_ACTIVE, TOTP path and MODE_ENROLL: the 6-digit code the user typed in.
    string totp_code = 2;
}

// Router to client. Carries a freshly issued device token after a successful TOTP submission
// (any successful TOTP, including enrollment, produces a new token). It is sent only when such
// a token exists: the token-path success has nothing to deliver here, so it is acknowledged by
// UserKeys alone. Failures never send this message - they drop the connection.
message TwoFactorResult
{
    bytes new_token = 1;
}

message RouterToClient
{
    TwoFactorChallenge two_factor_challenge       = 1;
    TwoFactorResult two_factor_result             = 2;
    UserKeys user_keys                            = 3;
    Notification notification                     = 4;
    ChangePasswordResult change_password_result   = 5;
    ConnectionOffer connection_offer              = 6;
    HostStatus host_status                        = 7;
    HostList host_list                            = 8;
    HostSearchResult host_search_result           = 9;
    TempHostList temp_host_list                   = 10;
    WorkspaceList workspace_list                  = 11;
    GroupList group_list                          = 12;
}

message ClientToRouter
{
    TwoFactorResponse two_factor_response         = 1;
    ChangePasswordRequest change_password_request = 2;
    ConnectionRequest connection_request          = 3;
    CheckHostStatus check_host_status             = 4;
    HostListRequest host_list_request             = 5;
    HostSearchRequest host_search_request         = 6;
    TempHostListRequest temp_host_list_request    = 7;
    WorkspaceListRequest workspace_list_request   = 8;
    GroupListRequest group_list_request           = 9;
}
