syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "router_peer.proto";

package proto.router;

message ConnectionRequest
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message CheckHostStatus
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message HostStatus
{
    enum Status
    {
        STATUS_UNKNOWN = 0;
        STATUS_OFFLINE = 1;
        STATUS_ONLINE  = 2;
    }

    int64 request_id = 1;
    Status status    = 2;
}

message RouterToClient
{
    ConnectionOffer connection_offer = 1;
    HostStatus host_status           = 2;
}

message ClientToRouter
{
    ConnectionRequest connection_request = 1;
    CheckHostStatus check_host_status    = 2;
}
