syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "router_peer.proto";
import "peer.proto";

package proto.router;

message ConnectionRequest
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message CheckHostStatus
{
    int64 request_id = 1;
    uint64 host_id   = 2;
}

message HostStatus
{
    enum Status
    {
        STATUS_UNKNOWN = 0;
        STATUS_OFFLINE = 1;
        STATUS_ONLINE  = 2;
    }

    int64 request_id     = 1;
    Status status        = 2;
    peer.Version version = 3;
}

message Computer
{
    int64 entry_id       = 1;  // computers.id.
    int64 workspace_id   = 2;  // 0 means unassigned (admin-only listing).
    int64 group_id       = 3;  // 0 means workspace root.
    int64 host_id        = 4;  // Host id assigned by the router (hosts.id).
    string name          = 5;  // Display label (plain).
    string computer_name = 6;  // Plain OS hostname reported by the host.
    string cpu_arch      = 7;  // CPU architecture reported by the host.
    string version       = 8;  // Aspia version reported by the host.
    string os_name       = 9;  // Operating system name reported by the host.
    string address       = 10; // Last seen peer address.
    bytes comment        = 11; // AEAD-encrypted with workspace GK.
    bytes user_name      = 12; // AEAD-encrypted with workspace GK.
    bytes password       = 13; // AEAD-encrypted with workspace GK.
    int64 last_connect   = 14; // Unix timestamp of the last connection.
    int64 last_modify    = 15; // Unix timestamp of the last edit by the admin.
    bool online          = 16; // Live host session currently exists for this host_id.
}

message ComputerListRequest
{
    // 0 = unassigned bucket (admin-only). Otherwise the router checks that the caller has
    // workspace access before returning the list.
    int64 workspace_id = 1;
    int64 group_id     = 2; // 0 means rows at the workspace root.
}

message ComputerList
{
    string error_code          = 1; // "ok" | "access_denied" | "internal_error"
    int64 workspace_id         = 2; // Echo of the request, so the client can route the response.
    int64 group_id             = 3; // Echo of the request.
    repeated Computer computer = 4;
}

message RouterToClient
{
    ConnectionOffer connection_offer = 1;
    HostStatus host_status           = 2;
    ComputerList computer_list       = 3;
}

message ClientToRouter
{
    ConnectionRequest connection_request      = 1;
    CheckHostStatus check_host_status         = 2;
    ComputerListRequest computer_list_request = 3;
}
