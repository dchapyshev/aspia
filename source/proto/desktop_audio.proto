syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package proto.audio;

enum Encoding
{
    ENCODING_UNKNOWN = 0;
    ENCODING_DEFAULT = 1;
    ENCODING_RAW     = 2;
    ENCODING_OPUS    = 3;
}

message Packet
{
    enum SamplingRate
    {
        SAMPLING_RATE_INVALID = 0;
        SAMPLING_RATE_44100   = 44100;
        SAMPLING_RATE_48000   = 48000;
        SAMPLING_RATE_96000   = 96000;
        SAMPLING_RATE_192000  = 192000;
    }

    enum BytesPerSample
    {
        BYTES_PER_SAMPLE_INVALID = 0;
        BYTES_PER_SAMPLE_2       = 2;
    }

    enum Channels
    {
        CHANNELS_INVALID  = 0;
        CHANNELS_MONO     = 1;
        CHANNELS_STEREO   = 2;
        CHANNELS_SURROUND = 3;
        CHANNELS_4_0      = 4;
        CHANNELS_4_1      = 5;
        CHANNELS_5_1      = 6;
        CHANNELS_6_1      = 7;
        CHANNELS_7_1      = 8;
    }

    int32 timestamp                 = 1;
    repeated bytes data             = 2;
    Encoding encoding               = 3;
    SamplingRate sampling_rate      = 4;
    BytesPerSample bytes_per_sample = 5;
    Channels channels               = 6;
}

message Pause
{
    bool enable  = 1;
    uint32 dummy = 2;
}

// Client <- Host (channel 7).
message HostToClient
{
    Packet packet = 1;
}

// Client -> Host (channel 7).
message ClientToHost
{
    Pause pause = 1;
}
