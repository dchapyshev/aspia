syntax = "proto3";

option optimize_for = LITE_RUNTIME;

import "chat.proto";
import "peer.proto";

package proto.user;

// Host UI to service.
message CredentialsRequest
{
    enum Type
    {
        UNKNOWN_TYPE = 0;
        REFRESH      = 1;
        NEW_PASSWORD = 2;
    }

    Type type = 1;
}

// Service to host UI.
message Credentials
{
    fixed64 host_id = 1;
    string password = 2;
}

message OneTimeSessions
{
    uint32 sessions = 1;
}

// Service to host UI.
message ConnectEvent
{
    uint32 client_id              = 1;
    string computer_name          = 2;
    string display_name           = 3;
    peer.SessionType session_type = 4;
}

// Service to host UI.
message DisconnectEvent
{
    uint32 client_id = 1;
}

// Service to host UI.
message RouterState
{
    enum State
    {
        UNKNOWN    = 0;
        DISABLED   = 1;
        CONNECTING = 2;
        CONNECTED  = 3;
        FAILED     = 4;
    }

    string host_name = 1;
    uint32 host_port = 2;
    State state      = 3;
}

// Service to host UI.
message ConfirmationRequest
{
    uint32 id                     = 1;
    uint32 timeout                = 2;
    string user_name              = 3;
    string computer_name          = 4;
    peer.SessionType session_type = 5;
}

// Host UI to service.
message ConfirmationReply
{
    uint32 id   = 1;
    bool accept = 2;
}

// Host UI to service.
message ServiceControl
{
    string command_name = 1;

    oneof value
    {
        int64 signed_integer    = 2;
        uint64 unsigned_integer = 3;
        bool boolean            = 4;
        string utf8_string      = 5;
    }
}

// Service to host UI.
message RecordingState
{
    string computer_name = 1;
    string user_name     = 2;
    bool started         = 3;
}

message UserToService
{
    CredentialsRequest credentials_request   = 1;
    OneTimeSessions one_time_sessions        = 2;
    ConfirmationReply confirmation_reply     = 3;
    ServiceControl control                   = 4;
    chat.Chat chat                           = 5;
}

message ServiceToUser
{
    RouterState router_state                 = 1;
    Credentials credentials                  = 2;
    ConnectEvent connect_event               = 3;
    DisconnectEvent disconnect_event         = 4;
    ConfirmationRequest confirmation_request = 5;
    RecordingState recording_state           = 6;
    chat.Chat chat                           = 7;
}
